apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest
      track: stable
  template:
    metadata:
      labels:
        app: aceest
        track: stable
    spec:
      containers:
      - name: aceest
        image: muruganantham21/aceest-fitness:v3.2.4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      track: canary
  template:
    metadata:
      labels:
        app: aceest
        track: canary
    spec:
      containers:
      - name: aceest
        image: muruganantham21/aceest-fitness:latest