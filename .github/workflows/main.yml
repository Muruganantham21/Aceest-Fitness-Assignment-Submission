name: CI Pipeline
 
on:
  push:
  pull_request:
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10  # more stable than 3.12

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest -v tests/  # make sure your tests are inside 'tests/' folder

    - name: Build Docker Image
      run: |
        docker build -t aceest-app .